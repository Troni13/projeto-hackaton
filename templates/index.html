<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeladoria IFSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-body-tertiary">

    <!--Navbar contendo título, darkmode switch, hamburguer-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Zeladoria IFSP</a>

            <div class="d-flex align-items-center ms-auto order-lg-last">
                <button class="btn btn-link text-light text-decoration-none shadow-none me-2" id="btnTema">
                    <span id="temaIcon">🌙</span>
                </button>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item"><a class="nav-link active" href="#">Abrir Chamado</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Painel de Gestão</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-body py-5 border-bottom">
        <div class="container text-center">
            <h1 class="display-5 fw-bold text-success">Campus Colaborativo</h1>
            <p class="lead text-muted mb-0">Viu algum problema? Precisa de ajuda? Conecte-se com a gente!</p>
        </div>
    </header>

    <!--Container para criação dos chamados-->
    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-1 bg-body">
                    <div class="card-header bg-success text-white py-3 border-0">
                        <h4 class="mb-0 fw-bold text-center">Novo Chamado</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label for="local" class="form-label fw-semibold">Localização</label>
                                <input type="text" class="form-control" id="local" name="local" placeholder="Ex: Bloco A, Lab 4" required>
                            </div>

                            <div class="mb-3">
                                <label for="categoria" class="form-label fw-semibold">Categoria</label>
                                <select class="form-select" id="categoria" name="categoria" required>
                                    <option value="" disabled selected>Selecione o tipo de problema...</option>
                                    <option value="estrutural">Estrutural (Elétrica, Hidráulica, Alvenaria)</option>
                                    <option value="tecnologica">Tecnológico (Projetor, Rede, Computador)</option>
                                    <option value="limpeza">Limpeza</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label fw-semibold">Descrição do Problema</label>
                                <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Descreva brevemente..." required></textarea>
                            </div>

                            <div class="mb-4 p-3 bg-body-tertiary rounded border-start border-4 border-warning">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="urgencia" name="urgencia">
                                    <label class="form-check-label fw-bold text-body" for="urgencia">Problema Crítico</label>
                                    <div class="form-text">Seu problema impede a realização de uma aula agora?</div>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">Enviar Chamado</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 Zeladoria IFSP</p>
            <small class="text-secondary">Gestão de Infraestrutura Colaborativa</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../static/js/script.js"></script>
</body>
</html>
