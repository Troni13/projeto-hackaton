{% extends "base.html" %}

{% block title %}Novo Chamado - Zeladoria IFSP{% endblock %}

{% block content %}
<header class="bg-body py-5 border-bottom">
    <div class="container text-center">
        <h1 class="display-5 fw-bold text-success">Campus Colaborativo</h1>
        <p class="lead text-muted mb-0">Viu algum problema? Precisa de ajuda? Conecte-se com a gente!</p>
    </div>
</header>

<main class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-1 bg-body">
                <div class="card-header bg-success text-white py-3 border-0">
                    <h4 class="mb-0 fw-bold text-center">Novo Chamado</h4>
                </div>
                <div class="card-body p-4">
                    
                    <form class="c-form" action="/api/chamados" method="POST" c-reset="true">
                        
                        <div class="mb-3">
                            <label for="localizacao" class="form-label fw-semibold">Localização</label>
                            <input type="text" class="form-control" id="localizacao" name="localizacao" placeholder="Ex: Bloco A, Lab 4" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label fw-semibold">Categoria</label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                <option value="" disabled selected>Selecione o tipo de problema...</option>
                                <option value="estrutural">Estrutural (Elétrica, Hidráulica, Alvenaria)</option>
                                <option value="tecnologica">Tecnológico (Projetor, Rede, Computador)</option>
                                <option value="limpeza">Limpeza</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="descricao" class="form-label fw-semibold">Descrição do Problema</label>
                            <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Descreva brevemente o que aconteceu..." required></textarea>
                        </div>

                        <div class="mb-4 p-3 bg-body-tertiary rounded border-start border-4 border-warning">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="urgencia" name="problema_critico">
                                <label class="form-check-label fw-bold text-body" for="urgencia">Problema Crítico</label>
                                <div class="form-text">Marque se este problema impede a realização de uma aula ou atividade agora.</div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">Enviar Chamado</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
